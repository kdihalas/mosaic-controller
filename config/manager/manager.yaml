apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosaic-controller
  namespace: mosaic-system
  labels:
    app.kubernetes.io/name: mosaic-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mosaic-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mosaic-controller
    spec:
      serviceAccountName: mosaic-controller
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: mosaic-controller:latest
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect=true
            - --storage-path=/data
            - --storage-addr=:9090
            - --storage-adv-addr=mosaic-controller.mosaic-system.svc.cluster.local:9090
            - --no-cross-namespace-refs=true
          ports:
            - name: artifacts
              containerPort: 9090
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 9440
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 10
          volumeMounts:
            - name: storage
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: storage
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mosaic-controller
  namespace: mosaic-system
spec:
  selector:
    app.kubernetes.io/name: mosaic-controller
  ports:
    - name: artifacts
      port: 9090
      targetPort: artifacts
